<style>
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 200%;
  background-image: radial-gradient(rgba(110,203,255,.15) 1px, transparent 1px);
  background-size: 30px 30px;
  animation: scrollDots 60s linear infinite;
  pointer-events: none;
  z-index: -1;
}

@keyframes scrollDots {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

:root {
  --bg: #000;
  --accent: #6ecbff;
  --accent-glow: rgba(110, 203, 255, .35);
  --text-primary: #fff;
  --text-dim: #94a3b8;
  --border: rgba(110, 203, 255, .08);
  --card-bg: rgba(255, 255, 255, .03);
  --font: 'Courier New', monospace;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font);
  overflow-x: hidden;
}

.tabBar {
  display: flex;
  flex-wrap: nowrap;  /* Prevent wrapping to the next line */
  background: rgba(255, 255, 255, .03);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px 0;
  backdrop-filter: blur(8px);
}

.tab {
  padding: 10px 15px;
  margin-right: 8px;
  border-radius: 10px 10px 0 0;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  background: transparent;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: .2s;
}

.tab img {
  width: 16px;
  height: 16px;
}

.tab:hover {
  color: var(--accent);
}

.tab.active {
  color: #000;
  background: var(--accent);
  font-weight: bold;
  box-shadow: 0 0 15px var(--accent-glow);
}

.tabPage {
  display: none;
}

.tabPage.active {

}

.header {
  height: 70px;
  display: flex;
  align-items: center;
  padding: 0 30px;

}

.logo {

}

.container {

  flex-direction: column;
  align-items: center;
  margin-top: 120px;
}

.card {
  background: var(--card-bg);
  width: 720px;
  padding: 40px;
  border-radius: 16px;
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 30px;
  backdrop-filter: blur(12px);
}

.left {
  width: 60%;
}

select, input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #0a0a0a;
  color: #fff;
  font-family: var(--font);
}

select option {
  background: #0a0a0a;
  color: #fff;
}

button {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font);
  font-weight: bold;
  transition: .2s;
  margin-top: .3rem;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 15px var(--accent-glow);
}

.previewBox {
  width: 120px;
  height: 120px;
  border-radius: 16px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}

.previewBox img {
  width: 200px;
  height: 64px;
}

.quoteBox {
  margin-top: 30px;
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
  min-height: 60px;
  opacity: 1;
  transition: opacity .6s ease;
}

.quoteBox.fade {
  opacity: 0;
}

.page {
  max-width: 900px;
  margin: auto;
  background: var(--card-bg);
  padding: 50px 60px;
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-top: 50px;
}

.movie {
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 18px;
  align-items: center;
}

.poster {
  width: 70px;
  border-radius: 6px;
}

a {
  color: var(--accent);
  text-decoration: none;
}

.settings {
  max-width: 700px;
  margin: auto;
  margin-top: 100px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.settings h2 {
  color: var(--accent);
}

.settingCard {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 25px;
  border-radius: 12px;
}

.quoteItem {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;

.quoteItem button {
  padding: 6px 10px;
  font-size: 12px;
}

.colorPreset {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid var(--border);
  display: inline-block;
  margin-right: 5px;
  vertical-align: middle;
}

/* Flexbox for 5 items per row */
#container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.zone-item {
  flex-basis: 19%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.zone-item img {
  width: 100%;
  height: auto;
  cursor: pointer;
}

.zone-item button {
  margin-top: 5px;
  padding: 10px;
  background-color: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
  width: 100%;
}

.zone-item button:hover {
  background-color: #45a049;
}
</style>
</head>

<script>
  // Function to activate cloaking (change title and favicon to Google)
  function activateCloaking() {
    // Set the title of the page to Google
    document.title = "Khan Academy";
    // Change the favicon to Google's
    const faviconURL = "https://www.google.com/s2/favicons?domain=khanacademy.org&sz=32";
    let link = document.querySelector("link[rel='icon']");

    // If no favicon link exists, create it
    if (!link) {
      link = document.createElement("link");
      link.rel = "icon";
      document.head.appendChild(link);
    }

    // Update the favicon with the Google favicon URL
    link.href = faviconURL;

    // Optionally, add a shortcut icon for older browsers
    let shortcutLink = document.querySelector("link[rel='shortcut icon']");
    if (!shortcutLink) {
      shortcutLink = document.createElement("link");
      shortcutLink.rel = "shortcut icon";
      document.head.appendChild(shortcutLink);
    }
    shortcutLink.href = faviconURL;
    alert("cloaked");
  }
</script>

<script>
// Variables for both Ethan Games and Gn Math Zones
const container = document.getElementById('container');
const searchBar = document.getElementById('searchBar');
const sortOptions = document.getElementById('sortOptions');
const filterOptions = document.getElementById('filterOptions');
const ownersFavoritesContainer = document.getElementById('ownersFavorites');
const ownersFavoritesCount = document.getElementById('ownersFavoritesCount');
const allCount = document.getElementById('allCount');

// URLs for game data sources
const ethanURL = "https://cdn.jsdelivr.net/gh/ethanytangcodes/art@main/games.json";
const zonesurls = [
  "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@main/zones.json",
  "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@latest/zones.json",
  "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@master/zones.json",
  "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets/zones.json"
];
const coverURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/html@main";

let zones = [];
let ethanGames = [];

// Owner's Favorite games
const ownersFavoritesList = [
  "Super Jump", 
  "Maze Runner", 
  "Pixel Shooter"
];

// List and load zones (Gn Math Games)
async function listZones() {
  try {
    const ghURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
    const ghRes = await fetch(ghURL + "?t=" + Date.now());
    let ghZones = await ghRes.json();

    zones = ghZones;

    zones.forEach(zone => {
      zone.ownersFavorite = ownersFavoritesList.includes(zone.name);
    });

    displayZones(zones);
  } catch (e) {
    console.error(e);
    container.innerHTML = `Error loading zones: ${e}`;
  }
}

// List and load Ethan games
async function listEthanGames() {
  try {
    const ethanRes = await fetch(ethanURL + "?t=" + Date.now());
    let ethanZonesRaw = await ethanRes.json();

    ethanGames = ethanZonesRaw;

    displayEthanGames(ethanGames);
  } catch (e) {
    console.error(e);
    container.innerHTML = `Error loading Ethan games: ${e}`;
  }
}

// Helper function to prevent duplicates in both categories
function getUniqueGames(gnMathGames, ethanGames) {
  const seenTitles = new Set();
  const uniqueGames = [];

  // Add unique Gn Math games
  gnMathGames.forEach(game => {
    if (!seenTitles.has(game.name)) {
      uniqueGames.push(game);
      seenTitles.add(game.name);
    }
  });

  // Add unique Ethan games
  ethanGames.forEach(game => {
    if (!seenTitles.has(game.title)) {
      uniqueGames.push(game);
      seenTitles.add(game.title);
    }
  });

  return uniqueGames;
}

// Display Gn Math Zones
function displayZones(z) {
  z.forEach(file => {
    const i = document.createElement('div');
    i.className = 'zone-item';
    i.style = "flex-basis: 19%; display: flex; flex-direction: column; align-items: center;";
    i.onclick = () => openGnMathZone(file);

    const img = document.createElement('img');
    img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    img.alt = file.name;
    img.loading = 'lazy';
    img.className = 'lazy-zone-img';
    img.style = "width: 100%; height: auto; cursor: pointer;";
    i.appendChild(img);

    const b = document.createElement('button');
    b.textContent = file.name;
    b.onclick = e => { e.stopPropagation(); openGnMathZone(file); };
    b.style = "margin-top: 5px; padding: 10px; background-color: #000000; color: white; border: none; cursor: pointer;";
    i.appendChild(b);

    container.appendChild(i);
  });
  allCount.textContent = `All Games (${zones.length + ethanGames.length})`;
  lazyLoadImages();
}

// Display Ethan Games with image field
function displayEthanGames(g) {
  g.forEach(file => {
    const i = document.createElement('div');
    i.className = 'zone-item';
    i.style = "flex-basis: 19%; display: flex; flex-direction: column; align-items: center;";
    i.onclick = () => openEthanGame(file);

    const img = document.createElement('img');
    img.dataset.src = `https://cdn.jsdelivr.net/gh/ethanytangcodes/art@main/${file.image}`;
    img.alt = file.title;
    img.loading = 'lazy';
    img.className = 'lazy-zone-img';
    img.style = "width: 100%; height: auto; cursor: pointer;";
    i.appendChild(img);

    const b = document.createElement('button');
    b.textContent = file.title;
    b.onclick = e => { e.stopPropagation(); openEthanGame(file); };
    b.style = "margin-top: 5px; padding: 10px; background-color: #000000; color: white; border: none; cursor: pointer;";
    i.appendChild(b);

    container.appendChild(i);
  });
  allCount.textContent = `All Games (${zones.length + ethanGames.length})`;
  lazyLoadImages();
}

// Lazy Load images for both sets
function lazyLoadImages() {
  const lazy = document.querySelectorAll('img.lazy-zone-img');
  const io = new IntersectionObserver((entries, observer) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const img = e.target;
        img.src = img.dataset.src;
        img.classList.remove('lazy-zone-img');
        observer.unobserve(img);
      }
    });
  }, { rootMargin: '100px', threshold: 0.1 });
  lazy.forEach(img => io.observe(img));
}

// Open Gn Math Zone game
async function openGnMathZone(file) {
  const wnd = window.open('about:blank', '_blank');
  if (!wnd) return alert('Allow popups to play!');
  wnd.document.write('Loading...');
  
  try {
    let url = file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    let res = await fetch(url + "?t=" + Date.now());
    let html = await res.text();
    wnd.document.open();
    wnd.document.write(html);
    wnd.document.close();
  } catch(e) {
    wnd.close();
    alert("Failed to load game: " + e);
  }
}

// Open Ethan game in the about:blank window
async function openEthanGame(file) {
  const wnd = window.open('about:blank', '_blank');
  if (!wnd) return alert('Allow popups to play!');
  wnd.document.write('Loading...');
  
  try {
    let url = file.link.startsWith('http') ? file.link : `https://cdn.jsdelivr.net/gh/ethanytangcodes/art@main/${file.link}`;
    const res = await fetch(url);
    let html = await res.text();
    
    const cdnBase = `https://cdn.jsdelivr.net/gh/ethanytangcodes/art@main/`;
    html = html.replace(/src=["'](?!http)([^"']+)["']/gi, (m, p) => `src="${cdnBase}${p}"`);
    html = html.replace(/href=["'](?!http)([^"']+)["']/gi, (m, p) => `href="${cdnBase}${p}"`);
    
    if (!/base/i.test(html)) {
      html = html.replace(/<head>/i, `<head><base href="${cdnBase}">`);
    }

    wnd.document.open();
    wnd.document.write(html);
    wnd.document.close();
  } catch (e) {
    wnd.close();
    alert("Failed to load game: " + e);
  }
}

// Filter and search zones (both Ethan games and Gn Math zones)
function filterZones() {
  const q = searchBar.value.toLowerCase();
  const uniqueGames = getUniqueGames(zones.filter(z => z.name.toLowerCase().includes(q)), ethanGames.filter(g => g.title.toLowerCase().includes(q)));
  container.innerHTML = "";
  uniqueGames.forEach(file => {
    if (file.image) displayEthanGames([file]);  // Ethan games
    else displayZones([file]);  // Gn Math games
  });
}

// Sort zones
function sortZones() {
  const s = sortOptions.value;
  if (s === "name") zones.sort((a, b) => a.name.localeCompare(b.name));
  else if (s === "id") zones.sort((a, b) => a.id - b.id);

  displayZones(zones);
  displayEthanGames(ethanGames);
}

// Fetch and display all zones (both Gn Math and Ethan)
async function listAllGames() {
  await Promise.all([
    listZones(),       // Load Gn Math zones
    listEthanGames()   // Load Ethan games
  ]);
}

// Start fetching games on page load
listAllGames();

// Event listeners
searchBar.addEventListener('input', filterZones);
sortOptions.addEventListener('change', sortZones);
</script>

      <iframe src="${url}" style="border:none;width:100vw;height:100vh"></iframe>
    </body>
  </html>
`);

// Close the document to finish loading the page content
t.document.close();

// Function to update the favicon
function updateFavicon() {
  var favicon = t.document.getElementById('favicon');
  if (favicon) {
    // Change the favicon by updating its href with a new timestamp to force refresh
    favicon.href = `https://www.blooket.com/favicon.ico?cache_buster=${new Date().getTime()}`;
  }
}

var updates = 0;
var interval = setInterval(function() {
  updateFavicon();
  updates++;
  if (updates >= 10) {
    clearInterval(interval); // Stop updating after 10 times
  }
}, 1000);
}
updatePreview()
let quotes=JSON.parse(localStorage.getItem("quotes"))||["Default quote"]
const quoteBox=document.getElementById("quoteBox")
function ensureQuote(){if(quotes.length===0)quotes=["Default quote"]}
let qIndex=Math.floor(Math.random()*quotes.length)
function cycleQuote(){quoteBox.classList.add("fade");setTimeout(()=>{qIndex=(qIndex+1)%quotes.length;quoteBox.innerHTML=quotes[qIndex];quoteBox.classList.remove("fade")},600)}
quoteBox.innerHTML=quotes[qIndex];setInterval(cycleQuote,6000)
function renderQuotes(){ensureQuote();let l=document.getElementById("quoteList");l.innerHTML="";quotes.forEach((q,i)=>{let r=document.createElement("div");r.className="quoteItem";r.innerHTML=`<input value="${q}" onchange="editQuote(${i},this.value)"><button onclick="deleteQuote(${i})">Delete</button>`;l.appendChild(r)});localStorage.setItem("quotes",JSON.stringify(quotes))}
function addQuote(){let v=document.getElementById("newQuote").value;if(!v)return;quotes.push(v);document.getElementById("newQuote").value="";renderQuotes()}
function editQuote(i,v){quotes[i]=v;localStorage.setItem("quotes",JSON.stringify(quotes))}
function deleteQuote(i){quotes.splice(i,1);ensureQuote();renderQuotes()}
renderQuotes()
function setAccent(c){document.documentElement.style.setProperty("--accent",c);document.documentElement.style.setProperty("--accent-glow",c+"55");document.getElementById("accentPicker").value=c;localStorage.setItem("accent",c)}
let saved=localStorage.getItem("accent");if(saved)setAccent(saved)
document.getElementById("accentPicker").addEventListener("input",e=>setAccent(e.target.value))
const API_KEY="d9b52b38"
async function searchMovie(){const q=document.getElementById("searchBox").value.trim();if(!q)return;const res=await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(q)}`);const data=await res.json();const r=document.getElementById("results");r.innerHTML="";if(!data.Search){r.innerHTML="No results";return}data.Search.forEach(m=>{const p=m.Poster!=="N/A"?m.Poster:"";const d=document.createElement("div");d.className="movie";d.innerHTML=`<img class="poster" src="${p}"><div><strong>${m.Title}</strong> (${m.Year})<br>IMDb ID: ${m.imdbID} <button onclick="copyID('${m.imdbID}')">Copy</button> <button onclick="watchMovie('${m.imdbID}')">Watch</button></div>`;r.appendChild(d)})}
function copyID(id){navigator.clipboard.writeText(id);alert("Copied "+id)}
function watchMovie(id){let url=`https://vidlink.pro/movie/${id}?autoplay=true`;let t=window.open("about:blank","_blank");t.document.write(`<html><body style="margin:0;background:black"><iframe src="${url}" allowfullscreen style="border:none;width:100vw;height:100vh"></iframe></body></html>`);t.document.close()}
let shortcuts={movies:"1",imdb:"2",games:"4",settings:"3"}
function saveShortcuts(){shortcuts.movies=document.getElementById("shortcutMovies").value;shortcuts.imdb=document.getElementById("shortcutIMDb").value;shortcuts.games=document.getElementById("shortcutGames").value;shortcuts.settings=document.getElementById("shortcutSettings").value;localStorage.setItem("shortcuts",JSON.stringify(shortcuts))}
let savedS=JSON.parse(localStorage.getItem("shortcuts"));if(savedS){shortcuts=savedS;document.getElementById("shortcutMovies").value=shortcuts.movies;document.getElementById("shortcutIMDb").value=shortcuts.imdb;document.getElementById("shortcutGames").value=shortcuts.games;document.getElementById("shortcutSettings").value=shortcuts.settings}
document.addEventListener("keydown",e=>{if(e.altKey){if(e.key===shortcuts.movies)switchTab('movies',document.querySelector('.tabBar .tab:nth-child(1)'));if(e.key===shortcuts.imdb)switchTab('imdb',document.querySelector('.tabBar .tab:nth-child(2)'));if(e.key===shortcuts.games)switchTab('games',document.querySelector('.tabBar .tab:nth-child(3)'));if(e.key===shortcuts.settings)switchTab('settings',document.querySelector('.tabBar .tab:nth-child(4)'))}})
</script>
